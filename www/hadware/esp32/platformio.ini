; SMARTLABS · firmware unificado para ESP32 DevKit V1
;
; Tres entornos comparten src/main.cpp + scaffolding (UART, WiFi, MQTT, OLED,
; OTA). Cada entorno define un MODE_* y solo el src/mode_<x>.cpp con el
; #ifdef coincidente aporta `kMode` y los handlers; los otros quedan como
; unidades de traducción vacías. Así no hace falta build_src_filter.
;
; Uso típico:
;   pio run -e becarios               (solo compila)
;   pio run -e maquinas -t upload     (flashea por USB)
;   pio run -e prestamo -t upload --upload-port esp32_SMART10003.local  (OTA)
;   pio device monitor -e prestamo

[platformio]
default_envs = prestamo
src_dir      = src
include_dir  = include

[env]
platform     = espressif32 @ ^6.7.0
board        = esp32doit-devkit-v1
framework    = arduino
monitor_speed = 115200
upload_speed  = 921600
lib_deps =
  knolleary/PubSubClient @ ^2.8
  adafruit/Adafruit GFX Library @ ^1.11.9
  adafruit/Adafruit SH110X @ ^2.1.10
  adafruit/Adafruit BusIO @ ^1.16.1
build_flags =
  -DCORE_DEBUG_LEVEL=2

; Acceso de becarios (SMART10000, 192.168.0.185)
[env:becarios]
build_flags = ${env.build_flags} -DMODE_BECARIOS

; Acceso a maquinas / mesas (SMART10001, 192.168.0.123)
[env:maquinas]
build_flags = ${env.build_flags} -DMODE_MAQUINAS

; Prestamo unificado credencial+herramienta (SMART10003, 192.168.0.34)
[env:prestamo]
build_flags = ${env.build_flags} -DMODE_PRESTAMO
