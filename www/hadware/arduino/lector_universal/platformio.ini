; SMARTLABS · sketch del lector RC522 + Arduino Nano.
; El .ino vive en el mismo directorio que este platformio.ini, asi que
; src_dir apunta aqui en lugar del default `src/`.
[platformio]
default_envs = nano_new
src_dir = .

; Arduino Nano clone con CH340. En esta unidad probada en 2026-04-27 funciono
; con el bootloader nuevo (115200). Si 'nano_new' falla con timeout o
; 'not in sync', usa 'nano_old' (57600).
[env]
platform   = atmelavr
framework  = arduino
monitor_speed = 9600
upload_speed  = 115200
lib_deps =
  miguelbalboa/MFRC522 @ ^1.4.11

[env:nano_old]
board = nanoatmega328
upload_speed = 57600

[env:nano_new]
board = nanoatmega328new
upload_speed = 115200

[env:uno]
board = uno
upload_speed = 115200
