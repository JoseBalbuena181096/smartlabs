map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.html;

    # Resolver de docker DNS interno: re-resuelve cada 10s para no cachear
    # IPs del backend cuando docker lo recrea con otra IP.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API REST
    location /api/ {
        set $backend "backend:8000";
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket
    location /ws/ {
        set $backend "backend:8000";
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # face-service: snapshot / detect / capture-tick / identify.
    # /api/face/* (registro, identify, etc.) sigue yendo al backend FastAPI
    # de arriba — solo enrutamos los endpoints que viven en el contenedor de
    # reconocimiento (cámara, loop de captura) hacia face-service:8500.
    # nginx con proxy_pass + variable no reescribe el path — usamos rewrite
    # explícito para quitar el prefijo /face-svc/ antes de proxypassear.
    location /face-svc/ {
        set $face "face-service:8500";
        rewrite ^/face-svc/(.*)$ /$1 break;
        proxy_pass http://$face;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
