services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smartlabs-v3-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartlabs}
      POSTGRES_USER: ${POSTGRES_USER:-smartlabs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    networks:
      - v3-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartlabs}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: smartlabs-v3-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartlabs}
      POSTGRES_USER: ${POSTGRES_USER:-smartlabs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-please-change-me-in-prod}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-720}
      # Reusa el broker EMQX del stack legacy (red compartida).
      MQTT_HOST: emqx
      MQTT_PORT: 1883
      MQTT_USER: ${MQTT_USER:-jose}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-public}
      MQTT_CLIENT_ID: smartlabs-v3-backend
      LOAN_DUE_HOURS: ${LOAN_DUE_HOURS:-8}
      INACTIVITY_TIMEOUT_SECONDS: ${INACTIVITY_TIMEOUT_SECONDS:-180}
      FACE_SERVICE_TOKEN: ${FACE_SERVICE_TOKEN:-change-me-face-service-token}
      FACE_SIMILARITY_THRESHOLD: ${FACE_SIMILARITY_THRESHOLD:-0.6}
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    networks:
      - v3-internal
      - smartlabs_legacy   # alias docker network del stack viejo
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend-build:
    build: ./frontend
    container_name: smartlabs-v3-frontend-build
    volumes:
      - frontend-dist:/var/www/html
    restart: "no"
    networks:
      - v3-internal

  face-service:
    build: ./face-service
    container_name: smartlabs-v3-face
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      RTSP_URL: ${RTSP_URL:-rtsp://user:pass@192.168.0.50:554/stream2}
      BACKEND_URL: http://backend:8000
      BACKEND_TOKEN: ${FACE_SERVICE_TOKEN:-change-me-face-service-token}
      SIMILARITY_THRESHOLD: ${FACE_SIMILARITY_THRESHOLD:-0.6}
      # Estación que esta cámara vigila — si vacío, el loop autónomo se
      # desactiva y solo opera en modo manual (admin /register, /identify
      # ad-hoc). Cuando hay SN, intenta identificar cada 2s y si match
      # abre sesión en esa estación.
      STATION_SN: ${FACE_STATION_SN:-}
      AUTO_IDENTIFY_INTERVAL: ${FACE_AUTO_INTERVAL:-2.0}
      AUTO_IDENTIFY_MIN_SCORE: ${FACE_AUTO_MIN_SCORE:-0.5}
      AUTO_IDENTIFY_SETTLE_SECONDS: ${FACE_AUTO_SETTLE:-60}
    ports:
      - "${FACE_SERVICE_PORT:-8500}:8500"
    networks:
      - v3-internal

  nginx:
    image: nginx:1.25-alpine
    container_name: smartlabs-v3-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend-build:
        condition: service_completed_successfully
    volumes:
      - frontend-dist:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_PORT:-8090}:80"
    networks:
      - v3-internal

networks:
  v3-internal:
    driver: bridge
  smartlabs_legacy:
    external: true
    name: smartlabs_network

volumes:
  pgdata:
  frontend-dist:
